apiVersion: ai.sap.com/v1alpha1
kind: ServingTemplate
metadata:
  name: granite-guardian-3.2-5b-vllm

spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/metric: concurrency
        autoscaling.knative.dev/target: "1"
        autoscaling.knative.dev/targetBurstCapacity: "0"

    spec:
      predictor:
        minReplicas: 1
        maxReplicas: 1

        containers:
        - name: kserve-container
          image: lokeshr11/granite-guardian-3.2-5b:latest   

          ports:
            - containerPort: 8080
              protocol: TCP

          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "20Gi"
              cpu: "4"
            requests:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "2"

          env:
            - name: HF_HOME
              value: "/tmp/huggingface"
            - name: TRANSFORMERS_CACHE
              value: "/tmp/huggingface"
            - name: VLLM_CONFIG_ROOT
              value: "/tmp/vllm"
            - name: VLLM_CACHE_ROOT
              value: "/tmp/vllm"
            - name: XDG_CACHE_HOME
              value: "/tmp/cache"
            - name: OUTLINES_CACHE_DIR
              value: "/tmp/outlines"
            - name: TRITON_CACHE_DIR
              value: "/tmp/triton"
            - name: NUMBA_CACHE_DIR
              value: "/tmp/numba"
            - name: TORCH_HOME
              value: "/tmp/torch"

            - name: VLLM_USE_V1
              value: "0"
            - name: VLLM_WORKER_MULTIPROC_METHOD
              value: "spawn"
            - name: VLLM_DISABLE_COMPILE_CACHE
              value: "1"

            - name: TRANSFORMERS_OFFLINE
              value: "1"
            - name: HF_HUB_OFFLINE
              value: "1"

            - name: PYTHONUNBUFFERED
              value: "1"

          volumeMounts:
            - name: shm
              mountPath: /dev/shm

          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8080
            initialDelaySeconds: 300
            periodSeconds: 30
            failureThreshold: 15

          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8080
            initialDelaySeconds: 420
            periodSeconds: 60

        volumes:
          - name: shm
            emptyDir:
              medium: Memory
              sizeLimit: "2Gi"
